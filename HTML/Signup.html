<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page Creation</title>

    <link rel="icon" href="../Images/SignupIcons.jpg" type="image/jpg">

    <link rel="stylesheet" href="../CSS/Signup.css">

    <!-- CDN Links are Full Form is Content Deliver Links -->

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (optional) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- jQuery UI CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card mt-5">
                    <div class="row g-0"> <!-- IMPORTANT ROW -->

                        <!-- LEFT SIDE (Signup Form) -->
                        <div class="col-md-5">
                            <div class="card-body p-4">
                                <img src="../Images/Daily_Img.jpg" alt="Daily_Img" class="img-fluid mb-4"
                                    id="Daily_Img">

                                <h4 class="mt-5 pt-5">Create an Account</h4>

                                <form action="" method="post" class="mt-4">
                                    <label for="name" class="form-check-label">Name</label>
                                    <input type="text" name="name" class="form-control mt-2" required>

                                    <label for="email" class="form-check-label mt-3">Email</label>
                                    <input type="email" name="email" class="form-control mt-2" required>

                                    <label for="password" class="form-check-label mt-3">Password</label>
                                    <input type="password" name="password" class="form-control mt-2" required>

                                    <div class="form-check mt-3">
                                        <input type="checkbox" class="form-check-input" id="iagree" required>
                                        <label for="iagree">I Agree to all the Terms & Conditions</label>
                                    </div>

                                    <div class="d-grid mt-4">
                                        <button type="submit" class="btn btn-success">Sign up</button>
                                    </div>

                                    <!-- OR DIVIDER -->
                                    <div class="d-flex align-items-center my-4">
                                        <hr class="flex-grow-1 m-0">
                                        <span class="px-3 text-muted">Or</span>
                                        <hr class="flex-grow-1 m-0">
                                    </div>

                                    <!-- SOCIAL BUTTONS -->
                                    <div class="d-flex">
                                        <a href="https://www.google.com/?zx=1772012556081&no_sw_cr=1" class="btn btn-outline-info w-50"><i class="bi bi-google me-2"></i>Google</a>
                                        <a href="https://www.facebook.com/?stype=lo&flo=1&deoia=1&jlou=AfjERtGSJpZbwS5kclLWIwWrgzKNsQfEhDAPs0Oj0V6u6ZvoefcFEuM0OMNYr-3uMqRrQlVVohh81soRcWI8CVn2_9VSVvm5wqVzxp7P_BayWA&smuh=26815&lh=AdDQB3tAQBxqmNbe-FQ" class="btn btn-outline-primary w-50 ms-3"><i class="bi bi-facebook me-2"></i>Facebook</a>
                                        <a href="../HTML/Home.html" class="btn btn-outline-success w-50 ms-3"><i class="bi bi-house-door me-2"></i>Home</a>
                                    </div>

                                    <div class="mt-3 text-center">
                                        <p>Already have an account?
                                            <a href="../HTML/Login.html"
                                                class="text-decoration-none text-success fw-bold">Login</a>
                                        </p>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- RIGHT SIDE (IMAGE) -->
                        <div class="col-md-7">
                            <img src="../Images/Signup_RightSide_Img.png" alt="Signup Image" class="img-fluid w-100 h-100">
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
