                        <form action="" method="post" class="">

                            <div class="input-group w-75">
                                <input type="email" name="email" id="txt_login_email" class="form-control" required>
                            </div>

                            <label for="Pwd" class="form-check-label text-white mt-3">Password</label>
                            <div class="input-group w-75">
                                <input type="password" name="pwd" id="txt_login_password" class="form-control" required>
                            </div>
                            <div class="form-check mt-3">
                                <input type="checkbox" name="rember" id="rember" class="form-check-input" value="rember" required>
                                <label for="rember" class="form-check-label text-white ms-1">Rember me?</label>
                            </div>  
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary w-75" id="login_btn">LOGIN</button>
                            </div>
                            <div class="mt-3">
                                <a href="../HTML/ForgotPassword.html" class="text-decoration-none text-warning">Forgot Password?</a>
                                <a href="../HTML/Signup.html" class="text-decoration-none text-warning" id="txt_signup">Signup?</a>
                            </div>
                        </form>
